name: IT 2.13

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: IT
    runs-on: ubuntu-22.04
    strategy:
     matrix:
       include:
         # Spark 3.5 with Scala 2.13
         - scala_version: '2.13.10'
           spark_version: '3.5.0'
           java_version: '8'
           use_copy_unload: 'true'
           cloud_provider: 'aws'
           run_query_in_async: 'true'
         - scala_version: '2.13.10'
           spark_version: '3.5.0'
           java_version: '8'
           use_copy_unload: 'true'
           cloud_provider: 'azure'
           run_query_in_async: 'true'
         - scala_version: '2.13.10'
           spark_version: '3.5.0'
           java_version: '8'
           use_copy_unload: 'false'
           cloud_provider: 'aws'
           run_query_in_async: 'true'
         - scala_version: '2.13.10'
           spark_version: '3.5.0'
           java_version: '8'
           use_copy_unload: 'false'
           cloud_provider: 'azure'
           run_query_in_async: 'true'
         - scala_version: '2.13.10'
           spark_version: '3.5.0'
           java_version: '8'
           use_copy_unload: 'true'
           cloud_provider: 'aws'
           run_query_in_async: 'false'
         - scala_version: '2.13.10'
           spark_version: '3.5.0'
           java_version: '8'
           use_copy_unload: 'true'
           cloud_provider: 'azure'
           run_query_in_async: 'false'
         - scala_version: '2.13.10'
           spark_version: '3.5.0'
           java_version: '8'
           use_copy_unload: 'false'
           cloud_provider: 'aws'
           run_query_in_async: 'false'
         - scala_version: '2.13.10'
           spark_version: '3.5.0'
           java_version: '8'
           use_copy_unload: 'false'
           cloud_provider: 'azure'
           run_query_in_async: 'false'
         # Spark 4.0 with Scala 2.13
         - scala_version: '2.13.16'
           spark_version: '4.0.0'
           java_version: '17'
           use_copy_unload: 'false'
           cloud_provider: 'aws'
           run_query_in_async: 'false'
         - scala_version: '2.13.16'
           spark_version: '4.0.0'
           java_version: '17'
           use_copy_unload: 'false'
           cloud_provider: 'azure'
           run_query_in_async: 'false'
         # Spark 4.1 with Scala 2.13
         - scala_version: '2.13.17'
           spark_version: '4.1.0'
           java_version: '17'
           use_copy_unload: 'false'
           cloud_provider: 'aws'
           run_query_in_async: 'false'
         - scala_version: '2.13.17'
           spark_version: '4.1.0'
           java_version: '17'
           use_copy_unload: 'false'
           cloud_provider: 'azure'
           run_query_in_async: 'false'

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java_version }}

    - name: Decrypt snowflake.json for testing
      run: ./.github/scripts/decrypt_secret.sh snowflake.travis.json snowflake.travis.json.gpg
      env:
        SNOWFLAKE_TEST_CONFIG_SECRET: ${{ secrets.SNOWFLAKE_TEST_CONFIG_SECRET }}

    - name: Run tests
      run: ./.github/scripts/run-tests-github.sh
      env:
        INTEGRATION_TESTS: true
        SPARK_SCALA_VERSION: ${{ matrix.scala_version }}
        SPARK_VERSION: ${{ matrix.spark_version }}
        SNOWFLAKE_TEST_ACCOUNT: ${{ matrix.cloud_provider }}
        SPARK_CONN_ENV_USE_COPY_UNLOAD: ${{ matrix.use_copy_unload }}
        SPARK_CONN_ENV_INTERNAL_EXECUTE_QUERY_IN_SYNC_MODE: ${{ matrix.run_query_in_async }}

    - uses: codecov/codecov-action@v4
      if: matrix.use_copy_unload != 'true' || matrix.cloud_provider != 'gcp'
      with:
        fail_ci_if_error: false
